<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="herekim">
<title>희열 - 방명록</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<h1><a href="index.html">희열</a></h1>

<div class="comments">
    <div class="comment-form">
        <input type="text" id="guest-name" placeholder="이름 (선택)" style="width: 100%; font-family: inherit; font-size: 11px; padding: 6px; border: 1px solid var(--border); border-radius: 3px; margin-bottom: 8px; box-sizing: border-box;">
        <textarea placeholder="방명록에 남길 말..." id="guestbook-text"></textarea>
        <button onclick="sendGuestbook()">방명록 남기기</button>
    </div>
</div>

<div class="footer">
    <a href="mailto:herekim@yplabs.kr">herekim@yplabs.kr</a><br>
    <a href="https://instagram.com/herekim_" target="_blank">@herekim_</a><br>
    © 2026 herekim
</div>

<script>
function sendGuestbook() {
    const name = document.getElementById('guest-name').value.trim() || '익명';
    const text = document.getElementById('guestbook-text').value.trim();
    if (text) {
        const subject = encodeURIComponent('희열 블로그 방명록');
        const body = encodeURIComponent(`이름: ${name}\n\n${text}`);
        window.location.href = `mailto:herekim@yplabs.kr?subject=${subject}&body=${body}`;
        document.getElementById('guest-name').value = '';
        document.getElementById('guestbook-text').value = '';
    }
}

document.getElementById('guestbook-text').addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendGuestbook();
    }
});
</script>

</body>
</html>
