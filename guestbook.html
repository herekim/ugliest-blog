<hr>

<div class="comment-form">
    <input type="text" id="guest-name" placeholder="이름 (선택)">
    <textarea placeholder="방명록에 남길 말..." id="guestbook-text"></textarea>
    <button onclick="sendGuestbook()">방명록 남기기</button>
</div>

<hr>

<div class="footer">
    <a href="mailto:herekim@yplabs.kr">herekim@yplabs.kr</a><span>·</span>
    <a href="https://instagram.com/herekim_" target="_blank">@herekim_</a><span>·</span>
    © 2026
</div>

<script>
function sendGuestbook() {
    const name = document.getElementById('guest-name').value.trim() || '익명';
    const text = document.getElementById('guestbook-text').value.trim();
    if (text) {
        const subject = encodeURIComponent('희열 블로그 방명록');
        const body = encodeURIComponent(`이름: ${name}\n\n${text}`);
        window.location.href = `mailto:herekim@yplabs.kr?subject=${subject}&body=${body}`;
        document.getElementById('guest-name').value = '';
        document.getElementById('guestbook-text').value = '';
    }
}

document.getElementById('guestbook-text').addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendGuestbook();
    }
});
</script>

</body>
</html>
