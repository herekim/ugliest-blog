<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="herekim">
<title>방명록 · 희열</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<main class="page">

    <header class="masthead">
        <h1 class="masthead__name"><a href="index.html">희열</a></h1>
    </header>

    <nav class="nav" aria-label="primary">
        <a href="index.html">글</a>
        <a href="about.html">소개</a>
        <a href="links.html">읽을거리</a>
        <a href="guestbook.html" aria-current="page">방명록</a>
    </nav>

    <article class="prose">
        <p class="standfirst">짧은 편지 한 통, 안부 한 줄.<br>이름은 적지 않으셔도 됩니다.</p>
    </article>

    <form class="form" onsubmit="sendGuestbook(event)">
        <div class="form__field">
            <label class="form__label" for="guest-name">이름 <span style="text-transform:none; letter-spacing:0; color: var(--ink-faint);">— 선택</span></label>
            <input type="text" id="guest-name" placeholder="익명도 환영합니다">
        </div>
        <div class="form__field">
            <label class="form__label" for="guestbook-text">남길 말</label>
            <textarea id="guestbook-text" placeholder="짧아도 좋습니다."></textarea>
        </div>
        <button type="submit" class="form__submit">남기기</button>
    </form>

    <footer class="colophon">
        <div class="colophon__group">
            <a href="mailto:khere220@gmail.com">khere220@gmail.com</a>
            <a href="https://instagram.com/keemier" target="_blank" rel="noopener">@keemier</a>
        </div>
        <div>© 2026 Heeyeol</div>
    </footer>

</main>

<script>
function sendGuestbook(e) {
    if (e) e.preventDefault();
    const name = document.getElementById('guest-name').value.trim() || '익명';
    const text = document.getElementById('guestbook-text').value.trim();
    if (text) {
        const subject = encodeURIComponent('희열 블로그 방명록');
        const body = encodeURIComponent(`이름: ${name}\n\n${text}`);
        window.location.href = `mailto:khere220@gmail.com?subject=${subject}&body=${body}`;
        document.getElementById('guest-name').value = '';
        document.getElementById('guestbook-text').value = '';
    }
}

document.getElementById('guestbook-text').addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendGuestbook();
    }
});
</script>

</body>
</html>
