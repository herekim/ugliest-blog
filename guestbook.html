<script>
function sendGuestbook(e) {
    if (e) e.preventDefault();
    const name = document.getElementById('guest-name').value.trim() || '익명';
    const text = document.getElementById('guestbook-text').value.trim();
    if (text) {
        const subject = encodeURIComponent('희열 블로그 방명록');
        const body = encodeURIComponent(`이름: ${name}\n\n${text}`);
        window.location.href = `mailto:khere220@gmail.com?subject=${subject}&body=${body}`;
        document.getElementById('guest-name').value = '';
        document.getElementById('guestbook-text').value = '';
    }
}

document.getElementById('guestbook-text').addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendGuestbook();
    }
});
</script>
