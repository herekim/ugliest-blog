        <textarea placeholder="한마디 남기기..." id="comment-text"></textarea>
        <button onclick="sendComment()">보내기</button>

<script>
function sendComment() {
    const text = document.getElementById('comment-text').value.trim();
    if (text) {
        const subject = encodeURIComponent('희열 블로그 댓글');
        const body = encodeURIComponent(text);
        window.location.href = `mailto:herekim@yplabs.kr?subject=${subject}&body=${body}`;
        document.getElementById('comment-text').value = '';
    }
}

document.getElementById('comment-text').addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        sendComment();
    }
});
</script>
